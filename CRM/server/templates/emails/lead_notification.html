<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Lead Captured</title>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <center>
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #ffffff;">
      <tr>
        <td align="center" style="padding: 40px 0;">
          <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="600" style="width: 600px; max-width: 600px; margin: 0 auto; border: 1px solid #171717; border-radius: 2px;">
            
            <!-- Header -->
            <tr>
              <td style="padding: 40px 40px 20px 40px; background-color: #171717;">
                <span style="font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #ffffff; text-transform: uppercase;">NOTIFICATION</span>
                <h1 style="margin: 10px 0 0 0; font-size: 24px; font-weight: 400; color: #ffffff; letter-spacing: -0.5px;">New Lead Captured</h1>
              </td>
            </tr>

            <!-- Data Body -->
            <tr>
              <td style="padding: 40px;">
                <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                  <!-- Name -->
                  <tr>
                    <td style="padding-bottom: 24px;">
                      <p style="margin: 0; font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px;">Full Name</p>
                      <p style="margin: 4px 0 0 0; font-size: 18px; color: #171717; font-weight: 500;">{{lead_name}}</p>
                    </td>
                  </tr>
                  <!-- Email -->
                  <tr>
                    <td style="padding-bottom: 24px;">
                      <p style="margin: 0; font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px;">Email Address</p>
                      <p style="margin: 4px 0 0 0; font-size: 16px; color: #2563eb; text-decoration: none;">{{lead_email}}</p>
                    </td>
                  </tr>
                  <!-- Message -->
                  <tr>
                    <td style="padding-bottom: 32px; border-bottom: 1px solid #e5e7eb;">
                      <p style="margin: 0; font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px;">Inquiry / Message</p>
                      <p style="margin: 12px 0 0 0; font-size: 15px; line-height: 1.6; color: #374151; background-color: #f9fafb; padding: 20px; border-radius: 4px; font-style: italic;">
                        "{{lead_message}}"
                      </p>
                    </td>
                  </tr>
                  <!-- CTA -->
                  <tr>
                    <td style="padding-top: 32px;">
                      <a href="{{dashboard_url}}" style="display: inline-block; padding: 14px 28px; background-color: #171717; color: #ffffff; font-size: 13px; font-weight: 600; text-decoration: none; border-radius: 4px; letter-spacing: 0.5px;">
                        Open Dashboard &rarr;
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Meta Footer -->
            <tr>
              <td style="padding: 0 40px 40px 40px;">
                 <p style="margin: 0; font-size: 11px; color: #9ca3af;">
                   Captured at: {{timestamp}} &bull; IP: {{request_ip}}
                 </p>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </center>
</body>
</html>
